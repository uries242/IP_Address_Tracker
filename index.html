<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="src/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="">
    </script>

  <script defer src="src/script.js"></script>


</head>




  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>






<body>

  <header>

    <h5 class="title">IP Address Tracker</h5>

    <form class="input_form">
      <input type="text" id="inputTextField" placeholder="Search for any IP address or domain" />
      <button class="submitBtn" type="submit" >
        <img src="./src/images/icon-arrow.svg" alt="">
      </button>
    </form>

  </header>

  <div class="map_section">

    <div class="info_container">

      <div>
        <h6>IP ADDRESS</h6>
        <p id="ip_address"></p>
        <p>192.212.174.101</p>
      </div>

      <div>
        <h6>Location</h6>
        <p id="location"></p>
        <p>Brooklyn, NY</p>
        <p>10001</p>
      </div>

      <div>
        <h6>Timezone</h6>
        <p id="timezone"></p> <!-- display UTC offset dynamically -->
        <p>UTC -05:00</p>
      </div>

      <div>
        <h6>ISP</h6>
        <p id="isp"></p>
        <p>SpaceX Starlink</p>
      </div>

    </div>


    <div id="map"></div>

  </div>

</body>

</html>
